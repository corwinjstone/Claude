name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: figma_builds/housa-app/package-lock.json
      - name: Install dependencies
        working-directory: figma_builds/housa-app
        run: npm install
      - name: Build
        working-directory: figma_builds/housa-app
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: figma_builds/housa-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
