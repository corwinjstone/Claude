name: Deploy Runs Directory to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'runs/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy runs static files to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./runs
          destination_dir: runs
          keep_files: true
          commit_message: 'Deploy RunClub events directory to GitHub Pages'
