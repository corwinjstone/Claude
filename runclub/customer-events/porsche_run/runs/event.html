<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunClub — Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700;1,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --volt:    #D7FF1E;
    --ink:     #0A0A0A;
    --chalk:   #FFFFFF;
    --ember:   #FF3B1F;
    --cobalt:  #3F7FD7;
    --magenta: #E63FBE;
    --track:   #1F1F1F;
    --accent:  var(--volt);
    --font-display: 'Barlow Condensed', 'Helvetica Neue Condensed', Impact, sans-serif;
    --font-body:    'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    background: var(--ink);
    color: var(--chalk);
    font-family: var(--font-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  body[data-accent="volt"]    { --accent: var(--volt); }
  body[data-accent="ember"]   { --accent: var(--ember); }
  body[data-accent="cobalt"]  { --accent: var(--cobalt); }
  body[data-accent="magenta"] { --accent: var(--magenta); }

  /* Typography */
  .display-mega {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: clamp(2.5rem, 8vw, 7rem);
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .display-l {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: clamp(2rem, 4vw, 3.5rem);
    line-height: 0.95;
    text-transform: uppercase;
  }
  .headline-l {
    font-family: var(--font-display);
    font-weight: 700; font-style: italic;
    font-size: clamp(1.4rem, 2.2vw, 2rem);
    line-height: 1.05;
    text-transform: uppercase;
  }
  .meta {
    font-weight: 500; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--track);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 0;
  }
  .logo {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .logo span { color: var(--volt); }

  .back-link {
    color: rgba(255,255,255,0.5);
    transition: color 120ms;
  }
  .back-link:hover { color: var(--chalk); }

  /* Hero */
  .hero {
    position: relative;
    padding: 5rem 0 4rem;
    border-bottom: 4px solid var(--accent);
    overflow: hidden;
  }
  .hero__bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .hero__bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.7) 60%, var(--ink) 100%);
  }
  .hero > .container { position: relative; z-index: 1; }
  .hero__eyebrow { color: var(--accent); margin-bottom: 1rem; }
  .hero__title { color: var(--chalk); margin-bottom: 1.5rem; }
  .hero__tagline {
    font-family: var(--font-display);
    font-weight: 700; font-style: italic;
    font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 2.5rem;
    max-width: 720px;
  }

  /* Date & status row */
  .hero__bar {
    display: flex; flex-wrap: wrap;
    gap: 2rem 3rem;
    margin-bottom: 0;
  }
  .hero__bar-item { min-width: 120px; }
  .hero__bar-num {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 0.95;
    color: var(--chalk);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  .hero__bar-num--accent { color: var(--accent); }
  .hero__bar-label { color: rgba(255,255,255,0.5); margin-top: 0.4rem; }

  /* Main body */
  .main { padding: 4rem 0; }
  .grid-2 {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 3rem;
  }
  @media (max-width: 800px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  .section-title {
    color: var(--accent);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--track);
  }
  .description {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.8);
    line-height: 1.65;
    margin-bottom: 2.5rem;
  }

  /* Stats list */
  .stat-list {
    background: var(--track);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 1.5rem 1.75rem;
  }
  .stat-list dl {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem 2rem;
  }
  .stat-list dt {
    color: rgba(255,255,255,0.45);
    font-weight: 500; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }
  .stat-list dd {
    font-family: var(--font-display);
    font-weight: 700; font-style: italic;
    font-size: 1.4rem;
    color: var(--chalk);
    text-transform: uppercase;
    line-height: 1;
  }

  /* CTA card */
  .cta-card {
    background: var(--track);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 2rem;
    position: sticky;
    top: 100px;
  }
  .cta-card__price {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: 4rem; line-height: 1;
    color: var(--chalk);
    font-variant-numeric: tabular-nums;
    margin-bottom: 0.25rem;
  }
  .cta-card__price small { font-size: 0.3em; color: rgba(255,255,255,0.4); margin-left: 0.3rem; }
  .cta-card__price-label { color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
  .cta-card__capacity {
    margin-bottom: 1.5rem;
  }
  .capacity-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    margin-top: 0.6rem; margin-bottom: 0.4rem;
    overflow: hidden;
  }
  .capacity-bar__fill {
    height: 100%;
    background: var(--accent);
    transition: width 600ms;
  }
  .capacity-bar__fill--full { background: var(--ember); }
  .capacity-text { color: rgba(255,255,255,0.55); font-size: 0.8rem; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 1rem 2rem;
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: 1.15rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    border: none; cursor: pointer;
    width: 100%;
    transition: background 120ms, color 120ms, transform 80ms;
    line-height: 1;
  }
  .btn-primary { background: var(--volt); color: var(--ink); }
  .btn-primary:hover { background: var(--chalk); }
  .btn-disabled {
    background: var(--track);
    color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: not-allowed;
  }
  .btn:active:not(.btn-disabled) { transform: scale(0.98); }

  /* Tags */
  .badges {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .badge {
    padding: 0.35rem 0.8rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.7);
  }

  /* Loading & error */
  .center-state {
    text-align: center;
    padding: 6rem 1rem;
    color: rgba(255,255,255,0.5);
  }
  .center-state h2 {
    font-family: var(--font-display);
    font-weight: 800; font-style: italic;
    font-size: 2rem;
    color: var(--chalk);
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  /* Status pill */
  .status-pill {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .status-pill--open       { background: rgba(215,255,30,0.12); color: var(--volt); border: 1px solid rgba(215,255,30,0.4); }
  .status-pill--early-bird { background: rgba(215,255,30,0.12); color: var(--volt); border: 1px solid rgba(215,255,30,0.4); }
  .status-pill--sold-out   { background: rgba(255,59,31,0.12); color: var(--ember); border: 1px solid rgba(255,59,31,0.4); }
  .status-pill--coming-soon { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); }

  /* Footer */
  footer {
    border-top: 1px solid var(--track);
    padding: 2.5rem 0;
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
  }
  footer .container {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 1rem;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="./" class="logo">Run<span>Club</span></a>
    <a href="./" class="meta back-link">← All Events</a>
  </div>
</nav>

<main id="content">
  <div class="center-state"><h2>Loading event…</h2></div>
</main>

<footer>
  <div class="container">
    <span class="logo" style="font-size: 1rem;">Run<span>Club</span></span>
    <span>2026 Season · <a href="./" style="color: rgba(255,255,255,0.6);">Browse all events →</a></span>
  </div>
</footer>

<script>
function fmtFullDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
}

function fmtTime(t) {
  if (!t || t === 'any') return null;
  const [h, m] = t.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = ((h + 11) % 12) + 1;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

function statusLabel(status) {
  return {
    open:        'Registration Open',
    early_bird:  'Early Bird Pricing',
    sold_out:    'Sold Out',
    coming_soon: 'Coming Soon',
  }[status] || status;
}

function pillClass(status) {
  return 'status-pill--' + status.replace('_','-');
}

function fmtNum(n) {
  return n == null ? '—' : n.toLocaleString('en-US');
}

function renderEvent(ev) {
  document.title = `${ev.name} — RunClub`;
  document.body.dataset.accent = ev.accent || 'volt';

  const fullDate = fmtFullDate(ev.date);
  const endDate = ev.end_date ? ' – ' + fmtFullDate(ev.end_date) : '';
  const startTime = fmtTime(ev.start_time);
  const location = ev.state ? `${ev.city}, ${ev.state}` : ev.city;

  const capacityPct = ev.capacity ? Math.min(100, Math.round((ev.registered / ev.capacity) * 100)) : null;
  const capacityFull = capacityPct != null && capacityPct >= 95;

  const heroBg = ev.hero_image
    ? `<div class="hero__bg" style="background-image: url('${ev.hero_image}');"></div>`
    : '';

  // Register button
  let ctaButton;
  if (ev.status === 'sold_out') {
    ctaButton = `<button class="btn btn-disabled" disabled>Sold Out</button>`;
  } else if (ev.status === 'coming_soon') {
    ctaButton = `<button class="btn btn-disabled" disabled>Registration Opens Soon</button>`;
  } else if (ev.registration_url) {
    ctaButton = `<a class="btn btn-primary" href="${ev.registration_url}">Register Now →</a>`;
  } else {
    ctaButton = `<button class="btn btn-primary" onclick="alert('Demo event — registration not wired up. The Porsche Run 5K is the only fully-implemented event.')">Register Now →</button>`;
  }

  const html = `
    <section class="hero">
      ${heroBg}
      <div class="container">
        <p class="meta hero__eyebrow">${ev.division.toUpperCase()} · ${ev.surface.toUpperCase()} · ${ev.distance_label.toUpperCase()}</p>
        <h1 class="display-mega hero__title">${ev.name}</h1>
        <p class="hero__tagline">${ev.tagline}</p>

        <div class="hero__bar">
          <div class="hero__bar-item">
            <div class="hero__bar-num hero__bar-num--accent">${fullDate.split(',')[1].trim()}</div>
            <p class="meta hero__bar-label">${fullDate.split(',')[0]}${endDate ? ' – ' + endDate.split(',')[1].trim() : ''}</p>
          </div>
          ${startTime ? `
          <div class="hero__bar-item">
            <div class="hero__bar-num">${startTime}</div>
            <p class="meta hero__bar-label">Start time</p>
          </div>` : ''}
          <div class="hero__bar-item">
            <div class="hero__bar-num">${location}</div>
            <p class="meta hero__bar-label">Location</p>
          </div>
        </div>
      </div>
    </section>

    <section class="main">
      <div class="container">

        <div class="badges">
          <span class="badge">${ev.distance_label}</span>
          <span class="badge">${ev.surface}</span>
          <span class="badge">${ev.division}</span>
          ${ev.elevation_gain_ft > 0 ? `<span class="badge">${fmtNum(ev.elevation_gain_ft)} ft elevation</span>` : ''}
          <span class="status-pill ${pillClass(ev.status)}">${statusLabel(ev.status)}</span>
        </div>

        <div class="grid-2">
          <div>
            <p class="meta section-title">About this event</p>
            <p class="description">${ev.description}</p>

            <p class="meta section-title">The numbers</p>
            <div class="stat-list">
              <dl>
                <div>
                  <dt>Distance</dt>
                  <dd>${ev.distance_label}</dd>
                </div>
                <div>
                  <dt>Surface</dt>
                  <dd>${ev.surface}</dd>
                </div>
                <div>
                  <dt>Division</dt>
                  <dd>${ev.division}</dd>
                </div>
                <div>
                  <dt>Elevation Gain</dt>
                  <dd>${ev.elevation_gain_ft > 0 ? fmtNum(ev.elevation_gain_ft) + ' FT' : 'Flat'}</dd>
                </div>
                <div>
                  <dt>Capacity</dt>
                  <dd>${ev.capacity ? fmtNum(ev.capacity) : 'Unlimited'}</dd>
                </div>
                <div>
                  <dt>Registered</dt>
                  <dd>${fmtNum(ev.registered)}</dd>
                </div>
              </dl>
            </div>
          </div>

          <aside>
            <div class="cta-card">
              <div class="cta-card__price">$${ev.price_usd}<small>USD</small></div>
              <p class="meta cta-card__price-label">${ev.status === 'early_bird' ? 'Early bird price · ends soon' : 'Entry fee'}</p>

              ${ev.capacity ? `
                <div class="cta-card__capacity">
                  <p class="meta capacity-text">Capacity</p>
                  <div class="capacity-bar">
                    <div class="capacity-bar__fill ${capacityFull ? 'capacity-bar__fill--full' : ''}" style="width: ${capacityPct}%"></div>
                  </div>
                  <p class="capacity-text">${fmtNum(ev.registered)} of ${fmtNum(ev.capacity)} spots filled (${capacityPct}%)</p>
                </div>
              ` : ''}

              ${ctaButton}
            </div>
          </aside>
        </div>

      </div>
    </section>
  `;

  document.getElementById('content').innerHTML = html;
}

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('content').innerHTML = `
    <div class="center-state">
      <h2>No event specified</h2>
      <p style="margin-bottom: 1.5rem;">Pick one from the homepage.</p>
      <a class="btn btn-primary" style="max-width: 280px; margin: 0 auto;" href="./">← Browse all events</a>
    </div>`;
} else {
  fetch('events.json')
    .then(r => r.json())
    .then(data => {
      const ev = data.events.find(e => e.id === id);
      if (!ev) {
        document.getElementById('content').innerHTML = `
          <div class="center-state">
            <h2>Event not found</h2>
            <p style="margin-bottom: 1.5rem;">"${id}" is not in the directory.</p>
            <a class="btn btn-primary" style="max-width: 280px; margin: 0 auto;" href="./">← Browse all events</a>
          </div>`;
        return;
      }
      renderEvent(ev);
    })
    .catch(err => {
      document.getElementById('content').innerHTML = `
        <div class="center-state">
          <h2>Couldn't load event</h2>
          <p>${err.message}</p>
        </div>`;
    });
}
</script>
</body>
</html>
